name: wikipulse-analytics

networks:
  wikipulse_net:
    driver: bridge

services:
  # 1. Zookeeper (Shared by HBase and Kafka)
  zookeeper:
    image: mmukadam/zookeeper:v3.8
    # Unique name avoids clashing with other projects; alias keeps ZK hostname stable.
    container_name: wikipulse-zookeeper
    ports:
      - "2181:2181"
    environment:
      # CRITICAL: Allows older HBase clients to ping the server
      ZOO_4LW_COMMANDS_WHITELIST: "*"
    volumes:
      # Persist ZK state so Kafka topic metadata + controller info survives container recreate.
      - zk_data:/data
      - zk_datalog:/datalog
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      wikipulse_net:
        aliases:
          - zookeeper-server

  # 2. Kafka Broker
  kafka:
    image: mmukadam/kafka:v7.4.0  # Equivalent to Kafka 3.4
    container_name: wikipulse-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-server:2181
      # Network configuration
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-server:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # --- Durability: replication factors must match broker count (1) ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      # --- Topic creation defaults: more partitions = Spark can parallelize, plus sane retention. ---
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 2147483648   # 2 GiB cap per partition so the disk never fills
      KAFKA_LOG_SEGMENT_BYTES: 268435456      # 256 MiB segments
      KAFKA_LOG_CLEANER_ENABLE: "true"
      # --- Consumer group hygiene: shorter empty-group purge, gentler initial rebalance. ---
      KAFKA_OFFSETS_RETENTION_MINUTES: 1440   # 24h instead of default 7d
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      # --- JVM heap (Confluent defaults to 1G; pin so it never balloons in a small container). ---
      KAFKA_HEAP_OPTS: "-Xms512m -Xmx1g"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      # Confluent image ships kafka-broker-api-versions which is the lightest readiness probe.
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    restart: unless-stopped
    networks:
      wikipulse_net:
        aliases:
          - kafka-server

  # Kafka web UI (topics, messages, consumer groups) — https://github.com/kafbat/kafka-ui
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: wikipulse-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: wikipulse
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-server:9092
    restart: unless-stopped
    networks:
      - wikipulse_net

  # 3. Database to act as Hive Metastore
  postgres-db:
    image: mmukadam/postgres:v16
    container_name: wikipulse-hive-metastore-db
    environment:
      POSTGRES_DB: hive_metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hivepassword
    volumes:
      - hive_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      wikipulse_net:
        aliases:
          - hive-metastore-db

  # Postgres for Streamlit rollups ONLY (never use hive metastore DB for this)
  metrics-db:
    image: postgres:16-alpine
    container_name: wiki-pulse-metrics-db
    environment:
      POSTGRES_DB: wiki_pulse_metrics
      POSTGRES_USER: wikipulse
      POSTGRES_PASSWORD: wikipulse_secret
    volumes:
      - metrics_db_data:/var/lib/postgresql/data
      - ./my_code/schemas/metrics_init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "55432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U wikipulse -d wiki_pulse_metrics -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - wikipulse_net

  wiki-streamlit:
    build:
      context: ./my_code/dashboard
      dockerfile: Dockerfile
    container_name: wiki-streamlit-dash
    environment:
      DATABASE_URL: postgresql://wikipulse:wikipulse_secret@metrics-db:5432/wiki_pulse_metrics
      STREAMLIT_REFRESH_SECS: "15"
    ports:
      - "8501:8501"
    depends_on:
      metrics-db:
        condition: service_healthy
    networks:
      - wikipulse_net

  wiki-producer:
    build:
      context: ./my_code/producer
      dockerfile: Dockerfile
    container_name: wiki-pulse-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-server:9092
      KAFKA_TOPIC: wiki.event.raw
      SSE_STREAM_URL: https://stream.wikimedia.org/v2/stream/recentchange
      # producer.py reads everything below; defaults are sane, override here for tuning.
      KAFKA_ACKS: "all"
      KAFKA_ENABLE_IDEMPOTENCE: "true"
      KAFKA_COMPRESSION: "snappy"
      KAFKA_RETRIES: "10"
      KAFKA_LINGER_MS: "20"
      KAFKA_REQUEST_TIMEOUT_MS: "30000"
      KAFKA_DELIVERY_TIMEOUT_MS: "120000"
      PRODUCER_HEARTBEAT_SECS: "30"
      LOG_LEVEL: "INFO"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - wikipulse_net
    restart: unless-stopped
    healthcheck:
      # Confirms the container can open a TCP socket to Kafka (not “messages flowing”, but catches dead broker / wrong network).
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; s=socket.create_connection(('kafka-server',9092),5); s.close()\"",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 120s

  # 3b. Watchdog — keeps the Spark streaming driver alive INSIDE main-bigdata-service.
  #     Checks every WATCHDOG_INTERVAL_SECS; if the supervisor (and therefore Spark) isn't
  #     running, it re-launches it via `docker exec`. Restart policy means the watchdog itself
  #     auto-recovers after `docker compose restart` or a host reboot.
  wiki-spark-watchdog:
    image: docker:27-cli
    container_name: wiki-spark-watchdog
    depends_on:
      main-bigdata-service:
        condition: service_started
      kafka:
        condition: service_healthy
      metrics-db:
        condition: service_healthy
    environment:
      WATCHDOG_TARGET: wikipulse-main-bigdata
      WATCHDOG_INTERVAL_SECS: "30"
      WATCHDOG_STARTUP_GRACE_SECS: "60"
      # Set to "1" to disable auto-restart (handy when you want to debug Spark manually).
      WATCHDOG_PAUSED: "0"
    volumes:
      # Read-only socket: watchdog only needs to exec into siblings, not manage them.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        echo "[watchdog $$(date -Iseconds)] starting; target=$$WATCHDOG_TARGET interval=$${WATCHDOG_INTERVAL_SECS}s"
        sleep "$${WATCHDOG_STARTUP_GRACE_SECS}"
        while true; do
          if [ "$$WATCHDOG_PAUSED" = "1" ]; then
            echo "[watchdog $$(date -Iseconds)] paused (WATCHDOG_PAUSED=1)"
          else
            if ! docker exec "$$WATCHDOG_TARGET" sh -c \
                 'ps -eo pid,cmd 2>/dev/null | grep -E "[s]park_streaming_supervisor|[w]iki_pulse_stream|[S]parkSubmit.*wiki_pulse_stream" >/dev/null'; then
              echo "[watchdog $$(date -Iseconds)] Spark not running — relaunching supervisor"
              docker exec -d "$$WATCHDOG_TARGET" bash -lc \
                'mkdir -p /opt/my_code/logs && nohup /opt/my_code/scripts/spark_streaming_supervisor.sh >> /opt/my_code/logs/spark_supervisor.log 2>&1 &' \
                || echo "[watchdog $$(date -Iseconds)] WARN docker exec failed"
            fi
          fi
          sleep "$${WATCHDOG_INTERVAL_SECS}"
        done
    restart: unless-stopped
    networks:
      - wikipulse_net

  # 4. Main Big Data Service (Professor's custom image)
  main-bigdata-service:
    image: mmukadam/cs523bdt-lab:v4.0
    container_name: wikipulse-main-bigdata
    hostname: localhost
    depends_on:
      postgres-db:
        condition: service_started
      zookeeper:
        condition: service_healthy
      kafka:
        condition: service_healthy
      metrics-db:
        condition: service_healthy
    environment:
      - TZ=America/Chicago  # OPTIONAL: Force specific timezone if volume fails
      - CLASS_PASS=DEcs523bdt_Feb2026
    ports:
      - "9870:9870"   # HDFS UI
      - "8088:8088"   # YARN UI
      - "10000:10000" # Hive JDBC
      - "16010:16010" # HBase Master UI
      - "4040:4040"   # Spark UI
    volumes:
      # Mount a local folder 'my_code' to share files
      - ./my_code:/opt/my_code
      - /etc/localtime:/etc/localtime:ro
    tty: true
    networks:
      wikipulse_net:
        aliases:
          - main-bigdata-service

# Define the persistent volume
volumes:
  hive_db_data:
  metrics_db_data:
  kafka_data:
  zk_data:
  zk_datalog:
